# RECON scraper source configuration.
# Edit this file when you want to add or remove source URLs/accounts without
# changing Python code. Keep secrets, browser cookies, and API keys out of here.

[run]
# Main orchestrator defaults. CLI flags can override these values.
limit = 10
timeout_seconds = 30
retries = 2
retry_base_seconds = 2.0
retry_max_seconds = 30.0
retry_jitter_seconds = 1.0
lock_stale_seconds = 900
# Keep model output small enough for reliable strict JSON and leave capacity
# between requests on the shared NVIDIA endpoint.
ai_batch_size = 2
ai_rate_limit_seconds = 5.0

[scheduler]
# Production-shaped scheduler defaults. This runs source-specific one-shot
# orchestrator commands and keeps its own state/logs beside connector state.
loop_sleep_seconds = 60
job_timeout_seconds = 300
state_file = ".state/scheduler.json"
log_file = ".logs/scheduler_runs.jsonl"
lock_file = ".state/scheduler.lock"
lock_stale_seconds = 7200

[scheduler.reddit]
enabled = true
# Four flairs repeat every four minutes, with one RSS request starting each minute.
cadence_seconds = 240
stagger_seconds = 60
jitter_seconds = 10
limit = 15

[scheduler.instagram]
enabled = true
# Seven public profiles start 45 seconds apart. The first sweep completes in
# 4m30s and each profile repeats every 5m15s.
cadence_seconds = 315
stagger_seconds = 45
jitter_seconds = 10
limit = 10
per_account = true

[scheduler.facebook]
enabled = true
# Let the stricter Facebook AI reviewer correct populated-but-wrong rule values.
# This affects enrichment precedence only; collection and browser behavior stay unchanged.
# Rotate reviewed hot targets one at a time instead of hammering all Marketplace
# searches together. With the current hot target count this yields about one
# browser-backed Marketplace search per minute, while each target repeats slower.
cadence_seconds = 180
target_cadence_seconds = 180
target_stagger_seconds = 60
jitter_seconds = 30
limit = 10
headless = true
browser = "chrome"
split_targets = true
target_groups = ["hot"]

[candidate_pool]
# Raw normalized candidates stay scraper-side until centralized AI parsing.
path = ".state/candidate_pool.sqlite3"

[ai_manager]
# Mix platforms in small batches, but flush a lone candidate after 30 seconds.
pool_path = ".state/candidate_pool.sqlite3"
log_file = ".logs/ai_manager.jsonl"
lock_file = ".state/ai_manager.lock"
batch_size = 2
max_wait_seconds = 30.0
poll_seconds = 2.0
rate_limit_seconds = 5.0
retry_seconds = 300
lease_seconds = 300

[media_worker]
# PostgreSQL is the durable media queue: uncached Instagram image rows are
# processed only after the AI manager has committed their listings.
log_file = ".logs/instagram_media_worker.jsonl"
lock_file = ".state/instagram_media_worker.lock"
batch_size = 25
poll_seconds = 60.0

[scheduler.operational_report]
enabled = true
# Persisted scheduler state keeps this report on a daily cadence even when
# connector collection is invoked more frequently.
cadence_seconds = 86400
output_dir = ".logs/reports"

[reddit.wts_computers]
enabled = true
# Human-facing source URL. The Reddit connector still uses subreddit + flair
# internally so it can request the RSS search URL with sort=new.
url = "https://www.reddit.com/r/jualbeliindonesia/?f=flair_name%3A%22WTS%3A%20Computers%20%26%20Peripherals%22"
urls = [
  "https://www.reddit.com/r/jualbeliindonesia/?f=flair_name%3A%22WTS%3A%20Computers%20%26%20Peripherals%22",
  "https://www.reddit.com/r/jualbeliindonesia/?f=flair_name%3A%22WTS%3A%20Electronics%22",
  "https://www.reddit.com/r/jualbeliindonesia/?f=flair_name%3A%22WTS%3A%20Video%20Games%20%26%20Consoles%22",
  "https://www.reddit.com/r/jualbeliindonesia/?f=flair_name%3A%22WTS%3A%20Smartphones%20%26%20Tablets%22",
]
subreddit = "jualbeliindonesia"
flair = "WTS: Computers & Peripherals"
flairs = [
  "WTS: Computers & Peripherals",
  "WTS: Electronics",
  "WTS: Video Games & Consoles",
  "WTS: Smartphones & Tablets",
]
feed_delay_seconds = 5.0
limit = 15
retries = 2
retry_wait_seconds = 20
retry_jitter_seconds = 1.0
timeout_seconds = 30
cooldown_seconds = 300
# rss is safest for cross-platform test runs because Reddit detail JSON often
# returns 403/429 from this environment. Use auto only for controlled debugging.
image_mode = "rss"

[instagram.accounts]
enabled = true
# Add more public account URLs by adding usernames here. Keep account names
# only, not session headers or cookies.
names = [
  "chemicy.consignment",
  "thelazytitip",
  "sensegame.id",
  "cappee.gaming",
  "gamecentral.id",
  "consigngaming",
  "ggsconsign",
]
max_posts_per_account = 12
delay_seconds = 0.0
retries = 1
retry_base_seconds = 2.0
retry_max_seconds = 30.0
retry_jitter_seconds = 1.0
timeout_seconds = 30
cooldown_seconds = 3600
fetch_mode = "browser"
browser_mode = "headed"
headless = false
browser = "chrome"
browser_wait_ms = 8000

[facebook.marketplace]
enabled = true
# Reviewed Facebook targets live beside the connector. Add queries there first,
# then reference target IDs or target groups here.
targets_file = "../facebook/source_targets.json"
target_groups = ["hot"]
limit = 10
candidate_limit = 24
max_scrolls = 0
wait_ms = 0
timeout_seconds = 30
cooldown_seconds = 300
headless = true
browser = "chrome"
session_mode = "ephemeral"
block_assets = true
details = false
