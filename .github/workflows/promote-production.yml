name: Promote Production Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Production Docker tag, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: novn01/recon.id
  STAGGING_TAG: stagging

jobs:
  promote-production:
    name: Promote stagging image to production version
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate version tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $VERSION"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote stagging image
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker pull "$IMAGE_NAME:$STAGGING_TAG"
          docker tag "$IMAGE_NAME:$STAGGING_TAG" "$IMAGE_NAME:$VERSION"
          docker push "$IMAGE_NAME:$VERSION"
