name: Promote Production Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Production Docker tag, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  WEB_IMAGE_NAME: novn01/recon.id
  SCRAPER_IMAGE_NAME: novn01/recon-scraper
  STAGGING_TAG: stagging

jobs:
  promote-production:
    name: Promote stagging image to production version
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate version tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $VERSION (expected X.Y.Z, for example 1.0.0)"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote stagging image manifests
        env:
          VERSION: ${{ inputs.version }}
        run: |
          for IMAGE_NAME in "$WEB_IMAGE_NAME" "$SCRAPER_IMAGE_NAME"; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$VERSION" \
              "$IMAGE_NAME:$STAGGING_TAG"
            docker buildx imagetools inspect "$IMAGE_NAME:$VERSION"
          done
