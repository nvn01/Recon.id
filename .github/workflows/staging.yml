name: Build Stagging Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recon-stagging-${{ github.ref }}
  cancel-in-progress: true

env:
  WEB_IMAGE_NAME: novn01/recon.id
  SCRAPER_IMAGE_NAME: novn01/recon-scraper
  IMAGE_TAG: stagging
  DATABASE_URL: postgresql://recon@localhost:5432/recon_ci
  SKIP_ENV_VALIDATION: "1"

jobs:
  verify:
    name: Verify application and scraper
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Test backend API
        run: npm run test:coverage

      - name: Check Next.js app
        run: npm run check

      - name: Build Next.js app
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python verification tools
        run: python -m pip install ruff -r scraper/requirements.txt

      - name: Run scraper unit tests
        run: python -m unittest discover scraper.tests

      - name: Lint scraper
        run: python -m ruff check scraper

  build-web:
    name: Build web (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push native web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ matrix.arch }}
          cache-from: type=gha,scope=web-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=web-${{ matrix.arch }}

  publish-web-manifest:
    name: Publish multi-platform web manifest
    needs: build-web
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish stagging web manifest
        run: |
          docker buildx imagetools create \
            --tag "$WEB_IMAGE_NAME:$IMAGE_TAG" \
            "$WEB_IMAGE_NAME:${IMAGE_TAG}-amd64" \
            "$WEB_IMAGE_NAME:${IMAGE_TAG}-arm64"
          docker buildx imagetools inspect "$WEB_IMAGE_NAME:$IMAGE_TAG"

  build-scraper:
    name: Build scraper (amd64)
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./scraper
          file: ./scraper/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.SCRAPER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=scraper-amd64
          cache-to: type=gha,mode=max,scope=scraper-amd64
